<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>고객확인 재이행 — ParaPara KYC 프로토타입</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap');

/* ── ParaPara design tokens (from _ds/parapara-design-system) ── */
:root{
  --white:rgb(255,255,255);
  --zinc-50:rgb(250,250,250); --zinc-100:rgb(244,244,245); --zinc-200:rgb(228,228,231);
  --zinc-400:rgb(161,161,170); --zinc-500:rgb(113,113,122); --zinc-600:rgb(82,82,91);
  --zinc-800:rgb(39,39,42); --zinc-900:rgb(24,24,27); --zinc-950:rgb(9,9,11);
  --indigo-50:rgb(238,242,255); --indigo-300:rgb(165,180,252); --indigo-500:rgb(99,102,241);
  --indigo-600:rgb(79,70,229); --indigo-700:rgb(67,56,202); --indigo-800:rgb(55,48,163);
  --green-500:rgb(34,197,94); --green-600:rgb(22,163,74);
  --amber-500:rgb(245,158,11); --amber-600:rgb(217,119,6);
  --blue-500:rgb(59,130,246); --blue-600:rgb(37,99,235);
  --red-400:rgb(248,113,113); --red-600:rgb(220,38,38);

  --badge-success-bg:rgba(22,163,74,0.1); --badge-warning-bg:rgba(217,119,6,0.1);
  --badge-error-bg:rgba(220,38,38,0.1); --badge-info-bg:rgba(37,99,235,0.1);

  --bg-default:var(--white); --bg-surface:var(--zinc-50); --bg-muted:var(--zinc-100);
  --bg-input:var(--zinc-200); --bg-inverse:var(--zinc-900);
  --border-default:var(--zinc-200); --border-ring:var(--zinc-400); --border-ring-subtle:rgba(9,9,11,0.05);
  --text-primary:var(--zinc-950); --text-secondary:var(--zinc-500); --text-on-muted:var(--zinc-900);
  --text-inverse:var(--white); --text-disabled:var(--zinc-400);

  --primary-default:var(--indigo-700); --primary-foreground:var(--indigo-50);
  --semantic-success:var(--green-600); --semantic-warning:var(--amber-600);
  --semantic-error:var(--red-600); --semantic-info:var(--blue-600);

  --radius-sm:6; --radius-md:10; --radius-lg:14; --radius-xl:16; --radius-2xl:24;
  --r-sm:6px; --r-md:10px; --r-lg:14px; --r-xl:16px; --r-2xl:24px; --r-pill:999px;
  --h-button-sm:36px; --h-button-lg:48px; --h-button-xl:56px; --h-input:50px;

  --font-sans:"Inter","Noto Sans KR",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  --font-numeric:"Inter","Noto Sans KR",system-ui,sans-serif;
  --weight-regular:400; --weight-medium:500; --weight-semibold:600; --weight-bold:700;

  --dur-fast:120ms; --dur-base:200ms; --dur-slow:320ms;
  --ease-standard:cubic-bezier(0.2,0,0,1);
  --ring-card:inset 0 0 0 1px var(--border-ring-subtle);
  --ring-hairline:inset 0 0 0 1px var(--border-default);
  --shadow-overlay:0 8px 24px rgba(9,9,11,0.12),0 2px 8px rgba(9,9,11,0.08);
}

*{box-sizing:border-box;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
body{margin:0;background:#e8e8ec;font-family:var(--font-sans);color:var(--text-primary)}

/* DS component interaction states */
.pp-btn:not(:disabled){transition:filter var(--dur-fast) var(--ease-standard),background var(--dur-fast) var(--ease-standard)}
.pp-btn-primary:not(:disabled):hover{filter:brightness(.93)} .pp-btn-primary:not(:disabled):active{filter:brightness(.86)}
.pp-btn-secondary:not(:disabled):hover{filter:brightness(.96)} .pp-btn-secondary:not(:disabled):active{filter:brightness(.92)}
.pp-btn-ghost:not(:disabled):hover{background:var(--bg-muted)} .pp-btn-ghost:not(:disabled):active{background:var(--bg-input)}
.pp-input:not(.pp-input-err):focus-within{box-shadow:inset 0 0 0 1.5px var(--primary-default)}
.pp-input-err{box-shadow:inset 0 0 0 1.5px var(--semantic-error)!important}
.pp-tap{cursor:pointer} .pp-tap:active{filter:brightness(.97)}
input::placeholder{color:var(--text-secondary)}
::-webkit-scrollbar{width:0;height:0}

/* prototype-scoped keyframes (from the .dc.html source) */
@keyframes pp-screen-in{from{transform:translateY(10px)}to{transform:none}}
@keyframes pp-float{0%,100%{transform:translateY(0) rotateX(14deg) rotateZ(-7deg)}50%{transform:translateY(-12px) rotateX(14deg) rotateZ(-7deg)}}
@keyframes pp-glow{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:.9;transform:scale(1.08)}}
@keyframes pp-spin{to{transform:rotate(360deg)}}
@keyframes pp-spin2{to{transform:rotate(360deg)}}
@keyframes pp-sheet-up{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes pp-fade{from{opacity:0}to{opacity:1}}
@keyframes pp-toast-in{from{opacity:0;transform:translate(-50%,14px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes pp-pop{0%{transform:scale(.5)}60%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes pp-ring{0%{transform:scale(.5);opacity:.6}100%{transform:scale(2.1);opacity:0}}
@keyframes pp-scan{0%{top:6%}50%{top:90%}100%{top:6%}}
@keyframes pp-push-in{from{opacity:0;transform:translateY(-130%)}to{opacity:1;transform:none}}

/* page chrome */
.page{min-height:100vh;display:flex;flex-direction:column;align-items:center;gap:22px;padding:40px 24px 72px}
.kicker{font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--primary-default)}
.device{width:390px;height:844px;border-radius:48px;position:relative;background:var(--bg-default);
  box-shadow:0 40px 80px rgba(0,0,0,.18),0 0 0 1px rgba(0,0,0,.12);overflow:hidden;flex:none}
.island{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:126px;height:37px;border-radius:24px;background:#000;z-index:50}
.statusbar{position:absolute;top:0;left:0;right:0;height:54px;z-index:40;display:flex;align-items:center;justify-content:space-between;padding:18px 30px 0;pointer-events:none}
.statusbar .t{font-size:15px;font-weight:600;letter-spacing:.02em;color:var(--text-primary)}
.home-ind{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:140px;height:5px;border-radius:999px;background:rgba(0,0,0,.85);z-index:50}
.accent-row{display:flex;align-items:center;gap:8px}
.swatch{width:24px;height:24px;border-radius:999px;border:2px solid var(--bg-default);box-shadow:0 0 0 1px var(--border-default);cursor:pointer}
.swatch.on{box-shadow:0 0 0 2px var(--text-primary)}
</style>
</head>
<body>
<div class="page">
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center">
    <div class="kicker">ParaPara · KYC</div>
    <div style="font-size:22px;font-weight:700">고객확인 재이행 — 인터랙티브 프로토타입</div>
    <div style="font-size:13px;color:var(--text-secondary)">화면을 직접 탭하며 전체 플로우를 진행해 보세요.</div>
    <div class="accent-row" style="margin-top:6px">
      <span style="font-size:12px;color:var(--text-secondary)">accent</span>
      <span class="swatch" data-accent="#4338ca" style="background:#4338ca"></span>
      <span class="swatch" data-accent="#0f766e" style="background:#0f766e"></span>
      <span class="swatch" data-accent="#b91c1c" style="background:#b91c1c"></span>
      <span class="swatch" data-accent="#7c3aed" style="background:#7c3aed"></span>
      <span class="swatch" data-accent="#1d4ed8" style="background:#1d4ed8"></span>
    </div>
  </div>

  <div class="device">
    <div class="island"></div>
    <div class="statusbar">
      <span class="t">9:41</span>
      <span style="display:flex;align-items:center;gap:7px">
        <svg width="19" height="12" viewBox="0 0 19 12"><rect x="0" y="7.5" width="3.2" height="4.5" rx=".7" fill="currentColor"/><rect x="4.8" y="5" width="3.2" height="7" rx=".7" fill="currentColor"/><rect x="9.6" y="2.5" width="3.2" height="9.5" rx=".7" fill="currentColor"/><rect x="14.4" y="0" width="3.2" height="12" rx=".7" fill="currentColor"/></svg>
        <svg width="17" height="12" viewBox="0 0 17 12"><path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill="currentColor"/><path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill="currentColor"/><circle cx="8.5" cy="10.5" r="1.5" fill="currentColor"/></svg>
        <svg width="27" height="13" viewBox="0 0 27 13"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="currentColor" stroke-opacity=".35" fill="none"/><rect x="2" y="2" width="20" height="9" rx="2" fill="currentColor"/><path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill="currentColor" fill-opacity=".4"/></svg>
      </span>
    </div>
    <div id="screen" style="position:relative;height:100%;width:100%;display:flex;flex-direction:column;background:var(--bg-default);overflow:hidden;font-family:var(--font-sans);transform:translateZ(0)"></div>
    <div class="home-ind"></div>
  </div>

  <!-- S1 intro · alternative layouts (static) -->
  <div style="width:100%;max-width:1200px;display:flex;flex-direction:column;gap:26px;margin-top:54px">
    <div style="text-align:center;display:flex;flex-direction:column;gap:6px">
      <div class="kicker">S1 인트로 · 대안 탐색</div>
      <div style="font-size:21px;font-weight:700">인트로 화면 대안 레이아웃 3가지</div>
      <div style="font-size:13px;color:var(--text-secondary)">같은 콘텐츠, 다른 정보 구조 — 위 프로토타입은 ‘신뢰 강조형(C)’ 방향이에요.</div>
    </div>
    <div id="alts" style="display:flex;gap:30px;justify-content:center;flex-wrap:wrap;align-items:flex-start"></div>
  </div>
</div>

<script>
/* ── pp-icons.js (Phosphor-Fill style custom element), verbatim from the bundle ── */
(function () {
  const I = {
    'caret-left': (m) => `<path d="M160 56 L96 128 L160 200" fill="none" stroke="currentColor" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>`,
    'caret-right': (m) => `<path d="M96 56 L160 128 L96 200" fill="none" stroke="currentColor" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>`,
    'caret-down': (m) => `<path d="M64 100 L128 164 L192 100" fill="none" stroke="currentColor" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>`,
    'arrow-right': (m) => `<path d="M40 128 H210 M150 70 L214 128 L150 186" fill="none" stroke="currentColor" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>`,
    'check': (m) => `<path d="M64 134 L108 178 L192 80" fill="none" stroke="currentColor" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>`,
    'x': (m) => `<path d="M72 72 L184 184 M184 72 L72 184" fill="none" stroke="currentColor" stroke-width="22" stroke-linecap="round"/>`,
    'shield-check': (m) => `<path d="M208 40H48a16 16 0 0 0-16 16v58.8c0 89.6 75.8 119.3 91 124.4a15.5 15.5 0 0 0 10 0c15.2-5.1 91-34.8 91-124.4V56a16 16 0 0 0-16-16Z" fill="currentColor"/><path d="M94 128 l24 24 l46 -56" fill="none" stroke="${m}" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>`,
    'check-circle': (m) => `<circle cx="128" cy="128" r="100" fill="currentColor"/><path d="M82 130 l30 30 l62 -70" fill="none" stroke="${m}" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>`,
    'seal-check': (m) => `<path d="M128 16 l22 22 31 -6 12 29 29 12 -6 31 22 22 -22 22 6 31 -29 12 -12 29 -31 -6 -22 22 -22 -22 -31 6 -12 -29 -29 -12 6 -31 -22 -22 22 -22 -6 -31 31 6 12 -29 29 -12Z" fill="currentColor"/><path d="M90 130 l26 26 l54 -62" fill="none" stroke="${m}" stroke-width="17" stroke-linecap="round" stroke-linejoin="round"/>`,
    'device-mobile': (m) => `<rect x="62" y="22" width="132" height="212" rx="28" fill="currentColor"/><rect x="92" y="44" width="72" height="7" rx="3.5" fill="${m}"/><circle cx="128" cy="206" r="9" fill="${m}"/>`,
    'identification-card': (m) => `<rect x="20" y="48" width="216" height="160" rx="26" fill="currentColor"/><circle cx="86" cy="110" r="24" fill="${m}"/><path d="M50 168 a36 36 0 0 1 72 0Z" fill="${m}"/><rect x="148" y="98" width="60" height="13" rx="6.5" fill="${m}"/><rect x="148" y="130" width="60" height="13" rx="6.5" fill="${m}"/>`,
    'camera': (m) => `<path d="M28 84h36l12-20a8 8 0 0 1 7-4h50a8 8 0 0 1 7 4l12 20h36a16 16 0 0 1 16 16v96a16 16 0 0 1-16 16H28a16 16 0 0 1-16-16v-96a16 16 0 0 1 16-16Zm100 26a38 38 0 1 0 0 76 38 38 0 0 0 0-76Z" fill="currentColor" fill-rule="evenodd"/>`,
    'bank': (m) => `<path d="M28 98 L128 42 L228 98 Z" fill="currentColor"/><rect x="26" y="198" width="204" height="22" rx="8" fill="currentColor"/><rect x="50" y="116" width="20" height="76" rx="4" fill="currentColor"/><rect x="98" y="116" width="20" height="76" rx="4" fill="currentColor"/><rect x="138" y="116" width="20" height="76" rx="4" fill="currentColor"/><rect x="186" y="116" width="20" height="76" rx="4" fill="currentColor"/>`,
    'envelope': (m) => `<rect x="26" y="54" width="204" height="148" rx="22" fill="currentColor"/><path d="M42 78 L128 144 L214 78" fill="none" stroke="${m}" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>`,
    'globe': (m) => `<circle cx="128" cy="128" r="100" fill="currentColor"/><g fill="none" stroke="${m}" stroke-width="11"><ellipse cx="128" cy="128" rx="44" ry="100"/><line x1="32" y1="98" x2="224" y2="98"/><line x1="32" y1="158" x2="224" y2="158"/><line x1="128" y1="28" x2="128" y2="228"/></g>`,
    'clock': (m) => `<circle cx="128" cy="128" r="100" fill="currentColor"/><path d="M128 70 V130 L172 152" fill="none" stroke="${m}" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>`,
    'fingerprint': (m) => `<g fill="none" stroke="currentColor" stroke-width="14" stroke-linecap="round"><path d="M40 130 a88 88 0 0 1 176 0"/><path d="M72 150 a56 56 0 0 1 112 -2 v36"/><path d="M104 132 a24 24 0 0 1 48 0 v54"/><path d="M128 132 v82"/></g>`,
    'paper-plane': (m) => `<path d="M226 28 L30 112 L114 142 L142 226 Z" fill="currentColor"/><path d="M226 28 L114 142" fill="none" stroke="${m}" stroke-width="12" stroke-linecap="round"/>`,
    'user-focus': (m) => `<circle cx="128" cy="118" r="34" fill="currentColor"/><path d="M74 196 a54 54 0 0 1 108 0Z" fill="currentColor"/><g fill="none" stroke="currentColor" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"><path d="M40 84 V56 a16 16 0 0 1 16 -16 H84"/><path d="M172 40 H200 a16 16 0 0 1 16 16 V84"/><path d="M216 172 V200 a16 16 0 0 1 -16 16 H172"/><path d="M84 216 H56 a16 16 0 0 1 -16 -16 V172"/></g>`,
    'sparkle': (m) => `<path d="M128 22 C140 82 174 116 234 128 C174 140 140 174 128 234 C116 174 82 140 22 128 C82 116 116 82 128 22 Z" fill="currentColor"/>`,
    'lock': (m) => `<rect x="46" y="110" width="164" height="124" rx="26" fill="currentColor"/><path d="M82 110 V82 a46 46 0 0 1 92 0 V110" fill="none" stroke="currentColor" stroke-width="22"/><circle cx="128" cy="160" r="13" fill="${m}"/><rect x="121" y="166" width="14" height="30" rx="7" fill="${m}"/>`,
    'bell': (m) => `<path d="M128 26a72 72 0 0 0-72 72c0 40-12 56-18 64a8 8 0 0 0 6 13h168a8 8 0 0 0 6-13c-6-8-18-24-18-64a72 72 0 0 0-72-72Z" fill="currentColor"/><path d="M104 208 a26 26 0 0 0 48 0" fill="currentColor"/>`,
    'warning': (m) => `<path d="M114 38 L16 208 a16 16 0 0 0 14 24 h196 a16 16 0 0 0 14 -24 L142 38 a16 16 0 0 0 -28 0Z" fill="currentColor"/><rect x="118" y="104" width="20" height="56" rx="10" fill="${m}"/><circle cx="128" cy="190" r="12" fill="${m}"/>`,
    'plus': (m) => `<path d="M128 56 V200 M56 128 H200" fill="none" stroke="currentColor" stroke-width="22" stroke-linecap="round"/>`,
    'pencil': (m) => `<path d="M156 44 L212 100 L100 212 L40 220 L48 160 Z" fill="currentColor"/><path d="M150 70 L186 106" fill="none" stroke="${m}" stroke-width="12" stroke-linecap="round"/>`,
    'chat': (m) => `<path d="M32 56a16 16 0 0 1 16-16h160a16 16 0 0 1 16 16v112a16 16 0 0 1-16 16H96l-44 36a8 8 0 0 1-13-6V56Z" fill="currentColor"/><circle cx="96" cy="112" r="11" fill="${m}"/><circle cx="136" cy="112" r="11" fill="${m}"/><circle cx="176" cy="112" r="11" fill="${m}"/>`,
  };
  const css = `:host{display:inline-flex;line-height:0;flex:none}svg{display:block}`;
  class PPIcon extends HTMLElement {
    static get observedAttributes() { return ['name', 'size', 'mark']; }
    connectedCallback() { this.render(); }
    attributeChangedCallback() { if (this.shadowRoot) this.render(); }
    render() {
      const name = this.getAttribute('name');
      const size = this.getAttribute('size') || 24;
      const mark = this.getAttribute('mark') || '#fff';
      const draw = I[name];
      if (!this.shadowRoot) this.attachShadow({ mode: 'open' });
      const inner = draw ? draw(mark) : '';
      this.shadowRoot.innerHTML = `<style>${css}</style><svg width="${size}" height="${size}" viewBox="0 0 256 256" aria-hidden="true">${inner}</svg>`;
    }
  }
  if (!customElements.get('pp-icon')) customElements.define('pp-icon', PPIcon);
})();

/* ── DS component helpers (rebuilt to the ParaPara bundle's exact specs) ── */
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;');}
const BTN_SIZE={sm:{h:'var(--h-button-sm)',fs:14,pad:'0 14px',r:'var(--r-lg)',gap:6},
  lg:{h:'var(--h-button-lg)',fs:16,pad:'0 16px',r:'var(--r-xl)',gap:8},
  xl:{h:'var(--h-button-xl)',fs:16,pad:'0 20px',r:'var(--r-xl)',gap:8}};
const BTN_VAR={primary:{bg:'var(--primary-default)',fg:'var(--primary-foreground)'},
  secondary:{bg:'var(--bg-muted)',fg:'var(--text-on-muted)'},
  ghost:{bg:'transparent',fg:'var(--text-primary)'}};
function btn(o){
  const S=BTN_SIZE[o.size||'lg'], V=BTN_VAR[o.variant||'primary'], d=!!o.disabled;
  return `<button type="button" class="pp-btn pp-btn-${o.variant||'primary'}" ${d?'disabled':''} ${d?'':`onclick="${o.onclick||''}"`}
    style="display:inline-flex;align-items:center;justify-content:center;gap:${S.gap}px;height:${S.h};padding:${S.pad};${o.full?'width:100%;':''}font-family:var(--font-sans);font-size:${S.fs}px;font-weight:var(--weight-semibold);line-height:1;color:${V.fg};background:${V.bg};border:none;border-radius:${S.r};cursor:${d?'not-allowed':'pointer'};opacity:${d?0.4:1};user-select:none;box-sizing:border-box">${o.html||''}</button>`;
}
const BADGE_VAR={primary:{bg:'var(--primary-default)',fg:'var(--primary-foreground)',ring:'none'},
  secondary:{bg:'var(--bg-muted)',fg:'var(--text-on-muted)',ring:'none'},
  outline:{bg:'transparent',fg:'var(--text-secondary)',ring:'inset 0 0 0 1px var(--border-default)'},
  success:{bg:'var(--badge-success-bg)',fg:'var(--semantic-success)',ring:'none'},
  warning:{bg:'var(--badge-warning-bg)',fg:'var(--semantic-warning)',ring:'none'},
  error:{bg:'var(--badge-error-bg)',fg:'var(--semantic-error)',ring:'none'},
  info:{bg:'var(--badge-info-bg)',fg:'var(--semantic-info)',ring:'none'}};
function badge(variant,html){const V=BADGE_VAR[variant]||BADGE_VAR.secondary;
  return `<span style="display:inline-flex;align-items:center;justify-content:center;height:24px;padding:0 10px;background:${V.bg};color:${V.fg};box-shadow:${V.ring};border-radius:var(--r-pill);font-family:var(--font-sans);font-size:12px;font-weight:var(--weight-medium);line-height:1;white-space:nowrap;box-sizing:border-box">${html}</span>`;}
function inputField(o){
  const ring=o.error?'inset 0 0 0 1.5px var(--semantic-error)':'none';
  const hc=o.error?'var(--semantic-error)':'var(--text-secondary)';
  return `<div style="display:flex;flex-direction:column;gap:6px;width:100%">
    ${o.label?`<label style="font-family:var(--font-sans);font-size:13px;font-weight:var(--weight-medium);color:var(--text-secondary);line-height:1">${o.label}</label>`:''}
    <div class="pp-input ${o.error?'pp-input-err':''}" style="display:flex;align-items:center;gap:8px;height:var(--h-input);padding:0 16px;background:var(--bg-input);border-radius:var(--r-xl);box-shadow:${ring};transition:box-shadow var(--dur-fast) var(--ease-standard);box-sizing:border-box">
      <input ${o.id?`id="${o.id}"`:''} ${o.inputmode?`inputmode="${o.inputmode}"`:''} value="${esc(o.value)}" oninput="${o.oninput||''}" placeholder="${esc(o.placeholder||'')}"

/* ── App: state machine ported from the .dc.html DCLogic Component ── */
const App = {

  state:{

    addr:{ title:'주소 검색', current:this.state.addr, options:['서울특별시 강남구 테헤란로 132','서울특별시 송파구 올림픽로 300','경기도 성남시 분당구 판교역로 235','부산광역시 해운대구 센텀중앙로 79'] },
  }; return sets[k]||null; },

      case 'acctCode': body=this.sAcctCode(); break;
      case 'carf': body=this.sCarf(); break;
      case 'review': body=this.sReview(); break;
      case 'done': body=this.sDone(); break;

  /* S2 — 본인 정보 (이름 + 주민등록번호) */
  sPhone(){

          <div style="font-size:13px;color:var(--text-secondary)">통신사와 인증 방식을 고르면 바로 인증을 요청해요.</div>

    </div>`;

          <div style="font-size:13px;line-height:1.6;color:var(--text-secondary)">기한이 지나면 <strong style="color:var(--text-primary)">매매 → 입출금 → 서비스</strong> 순으로 단계적으로 제한돼요. 모든 사용자에게 동일하게 적용되는 정책이에요.</div>
          <div style="display:flex;gap:10px">
            <div style="flex:1">${btn({variant:'secondary',size:'xl',full:true,onclick:'App.exitNow()',html:'나중에 알림 받기'})}</div>
            <div style="flex:1">${btn({size:'xl',full:true,onclick:'App.closeExit()',html:'계속 진행하기'})}</div>
          </div>
        </div>`});
    }

    if(s.acctHelp){
      const steps=[
        '연결된 은행 앱이나 문자에서 입금 내역을 열어요.',
        "1원 입금자명 <strong>‘파라파라’ 앞 숫자 3자리</strong>를 확인해요.",
        '그 숫자 3자리를 입력하면 인증이 완료돼요.',
      ];
      out+=bottomSheet({ title:'인증번호는 어떻게 확인하나요?', onClose:'App.closeAcctHelp()', html:`
        <div style="display:flex;flex-direction:column;gap:14px;padding-bottom:4px">
          ${steps.map((t,i)=>`<div style="display:flex;gap:12px"><span style="width:24px;height:24px;flex:none;border-radius:999px;background:var(--primary-default);color:#fff;display:grid;place-items:center;font-size:13px;font-weight:700">${i+1}</span><span style="font-size:14px;line-height:1.5;color:var(--text-primary)">${t}</span></div>`).join('')}
        </div>`});
    }

    if(s.sheet){
      const sd=this.sheetData();
      if(sd){
        const opts=sd.options.map((o,i)=>`<button onclick="App.pickSheet(${i})" style="display:flex;align-items:center;justify-content:space-between;gap:10px;height:52px;padding:0 16px;border:none;border-radius:14px;background:var(--bg-surface);font-family:var(--font-sans);font-size:15px;font-weight:500;color:var(--text-primary);cursor:pointer;text-align:left">
            <span>${o}</span>${o===sd.current?'<span style="color:var(--primary-default);display:flex"><pp-icon name="check" size="20"></pp-icon></span>':''}
          </button>`).join('');
        out+=bottomSheet({ title:sd.title, onClose:'App.closeSheet()', html:`<div style="display:flex;flex-direction:column;gap:6px;max-height:330px;overflow:auto">${opts}</div>`});
      }
    }

    if(s.loading){
      out+=`<div style="position:absolute;inset:0;z-index:50;background:rgba(255,255,255,.78);backdrop-filter:blur(3px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;animation:pp-fade .2s ease">
        ${spinner(42)}
        <div style="font-size:14px;font-weight:500;color:var(--text-secondary)">${s.loadingText}</div>
      </div>`;
    }

    if(s.toast){
      out+=`<div style="position:absolute;left:0;right:0;bottom:40px;z-index:60;display:flex;justify-content:center;padding:0 22px;animation:pp-toast-in .26s var(--ease-standard)">
        <div role="status" style="display:flex;align-items:center;min-height:41px;max-width:343px;width:100%;padding:12px 16px;background:var(--bg-inverse);color:var(--text-inverse);border-radius:var(--r-md);box-shadow:var(--shadow-overlay);font-family:var(--font-sans);font-size:14px;line-height:1.4;box-sizing:border-box">
          <span style="display:inline-flex;align-items:center;gap:8px"><span style="color:var(--semantic-success);display:flex"><pp-icon name="check-circle" size="18" mark="var(--bg-inverse)"></pp-icon></span>${s.toast}</span>
        </div>
      </div>`;
    }
    return out;
  },
};

      ${inner}
      ${foot}
    </div>
  </div>`;
}

  altCard('C · 신뢰 강조형','하나의 초점과 신뢰 신호 — 감정적 안심을 우선 (현재 프로토타입)',
    `<div style="flex:1;min-height:0;padding:8px 24px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:18px;overflow:hidden">
